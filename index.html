<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>QUESTIQUEST</title>
    <link rel="icon" href="Build/favicon.ico" type="image/x-icon">
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <canvas id="unity-canvas" width=530 height=550 tabindex="-1" style="width: 530px; height: 550px; background: #000000"></canvas>
    <script src="Build/questiquest-repo.loader.js"></script>
    <script>
      var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";

      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/questiquest-repo.data.unityweb",
        frameworkUrl: "Build/questiquest-repo.framework.js.unityweb",
        codeUrl: "Build/questiquest-repo.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "kudamonolp",
        productName: "QUESTIQUEST",
        productVersion: "DEMO",
      });
    </script>
  </body>
</html>
